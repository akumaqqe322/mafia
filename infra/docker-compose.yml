services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mafia_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  bot:
    build: ../apps/bot
    depends_on:
      - postgres
      - redis
    environment:
      BOT_TOKEN: "your_bot_token_here"
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/mafia_db
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production

  web-admin:
    build: ../apps/web-admin
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/mafia_db

volumes:
  postgres_data:
